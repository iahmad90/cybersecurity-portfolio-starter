name: PAM Vault Simulator Tests

on:
  push:
    paths:
      - "projects/pam-vault-simulator/**"
      - ".github/workflows/pam-vault-simulator.yml"
  pull_request:
    paths:
      - "projects/pam-vault-simulator/**"
      - ".github/workflows/pam-vault-simulator.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/pam-vault-simulator

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            projects/pam-vault-simulator/requirements.txt
            projects/pam-vault-simulator/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        env:
          PYTHONPATH: src
        run: pytest -q
