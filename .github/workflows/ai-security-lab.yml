name: AI Security Lab Tests

on:
  push:
    paths:
      - "projects/ai-security-entra-llm-lab/**"
      - ".github/workflows/ai-security-lab.yml"
  pull_request:
    paths:
      - "projects/ai-security-entra-llm-lab/**"
      - ".github/workflows/ai-security-lab.yml"

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/ai-security-entra-llm-lab

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            projects/ai-security-entra-llm-lab/requirements.txt
            projects/ai-security-entra-llm-lab/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        env:
          PYTHONPATH: src
        run: pytest -q
